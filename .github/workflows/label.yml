name: Labeler

on:
  issues:
    types: [opened, reopened, edited]
  pull_request:
    types: [opened, reopened]

jobs:
  labeler:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check Labels
        id: labeler
        uses: jimschubert/labeler-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Add labels based on user
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const isPR = !!context.payload.pull_request;
            const issueNumber = isPR
              ? context.payload.pull_request.number
              : context.payload.issue.number;

            const author = isPR
              ? context.payload.pull_request.user.login
              : context.payload.issue.user.login;

            const userLabels = {
              "u-zzn": "유진 ୨ৎ",
              "Sohyunnnn": "소현 ୨ৎ",
              "odukong": "수빈 ୨ৎ",
            };

            const labelToAdd = userLabels[author];

            if (labelToAdd) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issueNumber,
                labels: [labelToAdd],
              });
            }

      - name: Auto assign for issue
        if: ${{ github.event_name == 'issues' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issue = context.payload.issue;
            const author = issue.user.login;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              assignees: [author],
            });

      - name: Auto assign and request reviewers for PR
        if: ${{ github.event_name == 'pull_request' }}
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const pr = context.payload.pull_request;
            const author = pr.user.login;

            await github.rest.issues.addAssignees({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr.number,
              assignees: [author],
            });

            const allMembers = ["u-zzn", "Sohyunnnn", "odukong"];
            const reviewers = allMembers.filter((member) => member !== author);

            if (reviewers.length > 0) {
              await github.rest.pulls.requestReviewers({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                reviewers: reviewers,
              });
            }