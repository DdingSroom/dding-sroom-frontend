language: "ko-KR" # 리뷰 언어 설정

tone_instructions: > # 리뷰어 페르소나 및 스타일 지침
  경험 많은 시니어 개발자로서 동료 개발자의 성장을 돕는 코드 리뷰를 진행하세요.
  문제 지적보다 원인과 개선 방향을 중심으로 예시 코드와 함께 피드백하세요.
  React/Next.js, 접근성, 상태 관리, 비동기, 성능, 컴포넌트 설계 관점으로 리뷰하세요.
  JS/JSX 기반이므로 타입 지적은 버그 가능성이 크거나 TS 마이그레이션에 직결될 때만 하세요.
  한국어로 설명하되, 과도한 존댓말은 피하고 자연스러운 톤을 유지하세요.

early_access: false # 실험적 기능 사용 여부

reviews:
  profile: "chill" # 리뷰 강도 ('chill': 일반 / 'assertive': 꼼꼼)
  request_changes_workflow: false # 이슈 미해결 시 PR 승인 보류 여부
  high_level_summary: true # PR 상단에 변경사항 요약 표시
  changed_files_summary: true # 변경된 파일별 요약 표시
  review_status: true # 리뷰 완료 후 상태 요약 코멘트 게시
  assess_linked_issues: false # 연결된 이슈 자동 분석
  related_prs: false # 관련 PR 표시
  suggested_labels: true # 변경 내용 기반 라벨 자동 추천
  suggested_reviewers: false # 변경 내용 기반 리뷰어 추천
  auto_assign_reviewers: false # 추천 리뷰어 자동 배정
  sequence_diagrams: false # 시퀀스 다이어그램 자동 생성
  poem: true # 워크스루 하단에 짧은 시 추가

  auto_review:
    enabled: true # PR 생성 시 자동 리뷰 실행
    auto_incremental_review: true # 새 커밋 push 시 추가 리뷰 실행
    drafts: false # Draft PR 자동 리뷰 포함 여부
    ignore_title_keywords:
      - "[Docs]"
    base_branches:
      - "develop"
      - "main"
  
  path_filters:
    - "!public/**"
    - "!.next/**"
    - "!node_modules/**"
    - "!yarn.lock"

  path_instructions:
    - path: "src/app/**"
      instructions: |
        Next.js App Router 기준으로 서버 컴포넌트와 클라이언트 컴포넌트의 경계가 적절한지 검토해주세요.
        데이터 패칭 위치, 렌더링 전략, route segment 구성이 적절한지 확인해주세요.
        불필요하게 클라이언트 컴포넌트로 내려간 부분이 있다면 더 나은 분리 방향을 제안해주세요.
        성능 최적화는 실제로 필요한 경우에만 언급하고, useMemo/useCallback의 과도한 사용은 지양하는 방향으로 리뷰해주세요.

    - path: "src/components/**"
      instructions: |
        컴포넌트의 책임, 재사용성, 접근성, props 인터페이스, 스타일 구조를 중심으로 리뷰해주세요.
        프레젠테이셔널 성격의 컴포넌트에 도메인 로직이 과하게 들어가 있지 않은지도 함께 검토해주세요.
        UI와 비즈니스 로직이 과하게 섞여 있다면 분리 방향을 제안해주세요.
        성능 최적화는 실제로 필요한 경우에만 언급하고, useMemo/useCallback의 과도한 사용은 지양하는 방향으로 리뷰해주세요.

    - path: "src/hooks/**"
      instructions: |
        훅의 단일 책임 원칙, 의존성 배열 누락 또는 과잉, 불필요한 리렌더링 유발 여부를 중심으로 검토해주세요.
        현재는 JavaScript 코드베이스이므로 TypeScript 미도입 자체보다는 런타임 안정성, null/undefined 처리, 인터페이스 일관성을 중심으로 확인해주세요.
        향후 TypeScript 마이그레이션 시 경계가 모호해질 부분이 있다면 선택적으로 제안해주세요.
        도메인 로직이 훅 안에 과하게 들어가 있다면 분리 방향을 제안해주세요.

    - path: "src/utils/**"
      instructions: |
        유틸 함수의 순수성, 사이드 이펙트 여부, 엣지케이스 처리, 네이밍 명확성을 중심으로 검토해주세요.
        현재는 JavaScript 코드베이스이므로 TypeScript 미도입 자체보다는 런타임 안정성, null/undefined 처리, 입력값 계약의 명확성을 함께 확인해주세요.

    - path: "src/api/**"
      instructions: |
        API 클라이언트 계층(axios/fetch)의 책임 분리, 에러 처리 일관성, 재시도/타임아웃 전략의 적절성을 검토해주세요.
        인증 토큰 주입/갱신 인터셉터 로직에서 동시성 이슈(race condition), 무한 재시도, 보안 리스크가 없는지 확인해주세요.
        응답 데이터 파싱과 타입 계약이 호출부와 일관되는지, 실패 케이스가 사용자 경험에 맞게 처리되는지 함께 검토해주세요.

chat:
  auto_reply: false # 멘션 없이도 자동 응답 여부
